services:
  postgres:
    image: postgres:16-alpine
    container_name: innovatech-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-innovatech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innovatech_dev}
      POSTGRES_DB: innovatech
    volumes:
      # Volumen nombrado: persiste entre reinicios. Borrar solo con: docker compose down -v
      - innovatech_postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - innovatech-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-innovatech} -d innovatech"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: innovatech-keycloak
    entrypoint: ["/bin/bash", "-c"]
    command:
      - "/opt/keycloak/bin/kc.sh import --dir /opt/keycloak/data/import --override true && exec /opt/keycloak/bin/kc.sh start-dev"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
      KC_HTTP_PORT: 8180
      KC_HOSTNAME: localhost
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME_STRICT_HTTPS: "false"
      KC_HTTP_ENABLED: "true"
    volumes:
      - ./docker/keycloak/realm-innovatech.json:/opt/keycloak/data/import/innovatech-realm.json
    ports:
      - "8180:8180"
    networks:
      - innovatech-net
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/127.0.0.1/8180"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: innovatech-eureka
    environment:
      SERVER_PORT: 8761
    ports:
      - "8761:8761"
    networks:
      - innovatech-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  db-bootstrap:
    image: postgres:16-alpine
    container_name: innovatech-db-bootstrap
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-innovatech_dev}
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for db in usuarios proyectos tareas notificaciones; do
          psql -h postgres -U ${POSTGRES_USER:-innovatech} -d innovatech -tc "SELECT 1 FROM pg_database WHERE datname='$$db'" | grep -q 1 \
            || psql -h postgres -U ${POSTGRES_USER:-innovatech} -d innovatech -c "CREATE DATABASE $$db;"
        done
        echo "Bases de datos verificadas"
    networks:
      - innovatech-net
    restart: "no"

  ms-usuarios:
    build:
      context: ./ms-usuarios
      dockerfile: Dockerfile
    container_name: innovatech-ms-usuarios
    environment:
      SERVER_PORT: 8082
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-innovatech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innovatech_dev}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - innovatech-net

  ms-proyectos:
    build:
      context: ./ms-proyectos
      dockerfile: Dockerfile
    container_name: innovatech-ms-proyectos
    environment:
      SERVER_PORT: 8083
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-innovatech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innovatech_dev}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - innovatech-net

  ms-tareas:
    build:
      context: ./ms-tareas
      dockerfile: Dockerfile
    container_name: innovatech-ms-tareas
    environment:
      SERVER_PORT: 8084
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-innovatech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innovatech_dev}
    depends_on:
      postgres:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    networks:
      - innovatech-net

  ms-notificaciones:
    build:
      context: ./ms-notificaciones
      dockerfile: Dockerfile
    container_name: innovatech-ms-notificaciones
    environment:
      SERVER_PORT: 8085
      EUREKA_URL: http://eureka-server:8761/eureka/
      SPRING_PROFILES_ACTIVE: docker
      POSTGRES_USER: ${POSTGRES_USER:-innovatech}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-innovatech_dev}
    depends_on:
      postgres:
        condition: service_healthy
      db-bootstrap:
        condition: service_completed_successfully
      eureka-server:
        condition: service_healthy
    networks:
      - innovatech-net

  bff-gateway:
    build:
      context: ./bff-gateway
      dockerfile: Dockerfile
    container_name: innovatech-bff
    environment:
      SERVER_PORT: 8081
      EUREKA_URL: http://eureka-server:8761/eureka/
    depends_on:
      eureka-server:
        condition: service_healthy
      ms-usuarios:
        condition: service_started
      ms-proyectos:
        condition: service_started
      ms-tareas:
        condition: service_started
      ms-notificaciones:
        condition: service_started
    networks:
      - innovatech-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 45s

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: innovatech-api-gateway
    environment:
      SERVER_PORT: 8080
      EUREKA_URL: http://eureka-server:8761/eureka/
      KEYCLOAK_ISSUER_URI: http://localhost:8180/realms/innovatech
      SPRING_PROFILES_ACTIVE: docker
    depends_on:
      keycloak:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      bff-gateway:
        condition: service_healthy
      ms-usuarios:
        condition: service_started
      ms-tareas:
        condition: service_started
    ports:
      - "8080:8080"
    networks:
      - innovatech-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  innovatech_postgres_data:
    name: innovatech_postgres_data

networks:
  innovatech-net:
    driver: bridge
