    <text x="195" y="160" text-anchor="middle" font-size="11" fill="#64748b">Acci?n en UI</text>

    <!-- Navegador -->
    <rect x="280" y="120" width="110" height="52" rx="8" fill="url(#boxGrad)" stroke="#475569" stroke-width="1.5"/>
    <text x="335" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e293b">Navegador</text>
    <text x="335" y="160" text-anchor="middle" font-size="11" fill="#64748b">DOM / fetch</text>

    <!-- Frontend -->
    <rect x="420" y="120" width="110" height="52" rx="8" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
    <text x="475" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#1e40af">Frontend</text>
    <text x="475" y="160" text-anchor="middle" font-size="11" fill="#3b82f6">React :5173</text>

