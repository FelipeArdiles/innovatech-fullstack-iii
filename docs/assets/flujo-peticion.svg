  <text x="808" y="328" text-anchor="middle" font-size="9" fill="#059669">JSON</text>

  <line x1="710" y1="340" x2="620" y2="340" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="665" cy="340" r="11" fill="#059669"/>
  <text x="665" y="344" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">10</text>

  <line x1="560" y1="340" x2="475" y2="340" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="518" cy="340" r="11" fill="#059669"/>
  <text x="518" y="344" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">10</text>
  <text x="518" y="328" text-anchor="middle" font-size="9" fill="#059669">200 / 201 JSON</text>

  <line x1="420" y1="340" x2="335" y2="340" stroke="#059669" stroke-width="2" marker-end="url(#arrow-green)"/>
  <circle cx="378" cy="340" r="11" fill="#059669"/>
  <text x="378" y="344" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">11</text>
