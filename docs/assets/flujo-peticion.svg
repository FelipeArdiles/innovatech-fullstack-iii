  <circle cx="695" cy="146" r="11" fill="#2563eb"/>
  <text x="695" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">5</text>
  <text x="695" y="132" text-anchor="middle" font-size="9" fill="#2563eb">HTTP</text>

  <line x1="820" y1="146" x2="850" y2="146" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="835" cy="146" r="11" fill="#2563eb"/>
  <text x="835" y="150" text-anchor="middle" font-size="10" font-weight="bold" fill="#fff">6</text>
  <text x="835" y="132" text-anchor="middle" font-size="9" fill="#2563eb">HTTP</text>

  <line x1="970" y1="146" x2="1000" y2="146" stroke="#334155" stroke-width="2" marker-end="url(#arrow)"/>
  <circle cx="985" cy="146" r="11" fill="#2563eb"/>
