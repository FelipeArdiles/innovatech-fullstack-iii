    <text x="765" y="143" text-anchor="middle" font-size="13" font-weight="bold" fill="#5b21b6">BFF Gateway</text>
    <text x="765" y="160" text-anchor="middle" font-size="11" fill="#7c3aed">:8081 HTTP</text>

    <!-- MS -->
    <rect x="850" y="120" width="120" height="52" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
