<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 520" font-family="Arial, Helvetica, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#334155"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
    <linearGradient id="boxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f8fafc"/>
      <stop offset="100%" style="stop-color:#e2e8f0"/>
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="590" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#0f172a">
    Flujo de petici?n  Usuario a respuesta en UI
  </text>
  <text x="590" y="58" text-anchor="middle" font-size="13" fill="#64748b">
    Innovatech Solutions ? GET /api/proyectos (v?a BFF) ? POST /api/tareas omite BFF
  </text>

  <!-- INICIO -->
  <rect x="20" y="78" width="100" height="36" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="2"/>
  <text x="70" y="101" text-anchor="middle" font-size="13" font-weight="bold" fill="#166534">INICIO</text>

  <!-- Component boxes - row 1 -->
