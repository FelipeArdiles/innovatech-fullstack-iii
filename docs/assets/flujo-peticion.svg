  <text x="40" y="493" font-size="11" fill="#475569">
    Leyenda:  Ida (azul) ?  Vuelta (verde) ?  JWT / Eureka (punteado) ? Fuente: DIAGRAMA_FLUJO_PETICION.md
  </text>
