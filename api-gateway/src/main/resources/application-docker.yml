spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: http://keycloak:8180/realms/innovatech/protocol/openid-connect/certs
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: bff
              uri: http://bff-gateway:8081
              predicates:
                - Path=/api/**
              filters:
                - StripPrefix=0
